<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>光栅与卡口高级分析 | 双道路版 + 上牌后轨迹</title>
    <style>
        #rulerCanvas {
    width: 100%;
    height: 50px;
    display: block;
    margin-top: 8px;
}
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 15px;
        }
        .panel {
            background: #2b2b2b;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        }
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #0098ff;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        input[type="file"] {
            color: #aaa;
            font-size: 0.85em;
            width: 200px;
        }
        input[type="range"],
        label {
            cursor: pointer;
        }
        .status {
            color: #4caf50;
            font-weight: bold;
            font-size: 0.9em;
            margin-left: 10px;
        }
        .main-container {
            display: flex;
            gap: 10px;
            position: relative;
        }
        canvas {
            background: #111;
            border: 1px solid #444;
            border-radius: 4px;
            display: block;
            flex-grow: 1;
            height: 880px;
            cursor: grab;
        }
        #timeDisplay {
            font-size: 1.1em;
            font-family: monospace;
            color: #ffb74d;
            min-width: 130px;
            text-align: right;
        }
        .legend {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            margin-top: 5px;
            color: #bbb;
            flex-wrap: wrap;
        }
        .legend span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .color-box {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
        #detailPanel {
            display: none;
            width: 420px;
            background: #222;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            height: 858px;
            overflow-y: auto;
            box-shadow: -4px 0 10px rgba(0, 0, 0, 0.5);
        }
        #detailPanel h3 {
            margin: 0 0 10px 0;
            font-size: 1.1em;
            color: #4fc3f7;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }
        #detailPanel .close-btn {
            float: right;
            cursor: pointer;
            color: #aaa;
            background: none;
            padding: 0;
            font-size: 1.2em;
            margin-top: -3px;
            border: none;
        }
        #detailPanel .close-btn:hover {
            color: #fff;
        }
        .traj-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
            text-align: center;
        }
        .traj-table th,
        .traj-table td {
            padding: 6px 4px;
            border: 1px solid #444;
        }
        .traj-table th {
            background: #333;
            position: sticky;
            top: 0;
            box-shadow: 0 2px 2px rgba(0, 0, 0, 0.5);
        }
        .traj-table tr:nth-child(even) {
            background: #2a2a2a;
        }
        .traj-table tr:hover {
            background: #444;
        }
        .toggle-group {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 0.9em;
            background: #333;
            padding: 5px 10px;
            border-radius: 4px;
        }
        .toggle-group label:hover {
            color: #4fc3f7;
        }
        .seg-header {
            background: #005f9e !important;
            color: #fff;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #tooltip {
            position: fixed;
            display: none;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 1000;
            font-size: 0.85em;
            white-space: pre;
            border: 1px solid #4fc3f7;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }
        .json-viewer {
            text-align: left;
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.95em;
            color: #81c784;
            background: #111;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
        }
        .detail-btn {
            background: #4caf50;
            padding: 3px 8px;
            font-size: 0.85em;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            color: #fff;
        }
        .detail-btn:hover {
            background: #66bb6a;
        }
        .road-separator-label {
            color: #888;
            font-size: 13px;
            font-style: italic;
            text-align: center;
            letter-spacing: 2px;
        }
        .main-container {
    display: flex;
    gap: 10px;
    position: relative;
}
#leftDetailPanel, #detailPanel {
    flex-shrink: 0;
}
canvas {
    flex-grow: 1;
    height: 880px;
    cursor: grab;
}
#rulerCanvas {
    cursor: crosshair; /* 默认显示十字，表示可框选 */
}
.controls label:has(input[type="file"]) {
            display: none;
        }
    </style>
</head>
<body>

<div id="tooltip"></div>

<div class="panel">
    <div class="controls">
        <label>1. 光栅: <input type="file" id="rasterFile" accept=".jsonl"></label>
        <label>2. 卡口: <input type="file" id="gantryFile" accept=".jsonl"></label>
        <label>3. 轨迹集(txt): <input type="file" id="trajFile" accept=".txt"></label>
        <label>4. 上牌轨迹(jsonl): <input type="file" id="platedFile" accept=".jsonl"></label>
        <span id="loadStatus" class="status">请依次加载文件(1-3必填,4选填)...</span>
        <button id="btnFocusRange" style="background:#e67e22;">🎯 聚焦高亮区间</button>
    </div>

    <div class="controls">
        <button id="btnPlay" disabled>播放 / 暂停</button>
        <button id="btnReset" disabled>重置</button>
        <label>倍速: <input type="range" id="speedRange" min="1" max="20" value="5"></label>
        <div style="flex-grow: 1; display: flex; align-items: center; gap: 10px;">
            <span style="font-size:0.9em;">进度:</span>
            <input type="range" id="progressBar" min="0" max="100" value="0" style="flex-grow: 1;" disabled>
        </div>
        <span id="timeDisplay">00:00:00.000</span>
    </div>

    <div class="legend">
        <span><div class="color-box" style="background: #81c784;"></div>上方-方向1</span>
        <span><div class="color-box" style="background: #e57373;"></div>上方-方向2</span>
        <span><div class="color-box" style="background: rgba(255, 213, 79, 0.4);"></div>穿越段</span>
        <span><div class="color-box" style="background: #f44336; box-shadow: 0 0 8px #f44336;"></div>闪光(断面任意设备)</span>
        <span><div class="color-box" style="border: 2px solid #e040fb; border-radius:50%; background: transparent;"></div>异常：前后100m凭空出现</span>
        <span><div class="color-box" style="background: #FFD54F;"></div>下方-上牌方向1</span>
        <span><div class="color-box" style="background: #FF8A65;"></div>下方-上牌方向2</span>
        <span><div class="color-box" style="background: #9E9E9E;"></div>下方-无车牌</span>
    </div>
</div>

<div class="main-container" style="display: flex; flex-direction: column; gap: 10px;">
    <div id="rulerContainer" style="margin-bottom: 8px;">
    <canvas id="rulerCanvas" width="1200" height="50" style="background: #2a2a2a; border-radius: 4px; border: 1px solid #444; cursor: pointer; width: 100%;"></canvas>
</div>
      <div style="display: flex; gap: 10px;">
    <div id="leftDetailPanel" style="display: none; width: 420px; background: #222; border: 1px solid #444; border-radius: 4px; padding: 10px; height: 858px; overflow-y: auto; box-shadow: 4px 0 10px rgba(0,0,0,0.5);">
    <button class="close-btn" onclick="closeLeftDetailPanel()">×</button>
    <h3 id="leftDetailTitle">车辆轨迹明细</h3>
    <div class="toggle-group" id="leftVehicleToggleGroup">
        <label><input type="radio" name="leftVehicleViewMode" value="near" checked onchange="switchLeftVehicleViewMode()"> 仅看卡口附近</label>
        <label><input type="radio" name="leftVehicleViewMode" value="all" onchange="switchLeftVehicleViewMode()"> 全网分段轨迹</label>
    </div>
    <p id="leftDetailDesc" style="font-size: 0.85em; color: #aaa; margin-top: 0px; margin-bottom: 8px;"></p>
    <table class="traj-table" id="leftDetailTable"></table>
</div>
    <canvas id="roadCanvas" width="1200" height="880"></canvas>

    <div id="detailPanel">
        <button class="close-btn" onclick="closeDetailPanel()">×</button>
        <h3 id="detailTitle">明细信息</h3>
        <div class="toggle-group" id="vehicleToggleGroup">
            <label><input type="radio" name="vehicleViewMode" value="near" checked onchange="switchVehicleViewMode()"> 仅看卡口附近</label>
            <label><input type="radio" name="vehicleViewMode" value="all" onchange="switchVehicleViewMode()"> 全网分段轨迹</label>
        </div>
<div class="toggle-group" id="gantryToggleGroup" style="display:none;">
    <label><input type="radio" name="gantryViewMode" value="upToNow" checked onchange="switchGantryViewMode()"> 截止当前时间</label>
    <label><input type="radio" name="gantryViewMode" value="all" onchange="switchGantryViewMode()"> 全部上报记录</label>
    <label style="margin-left:10px;">最近 <input type="number" id="gantrySeconds" value="5" min="1" max="60" style="width:50px;" onchange="switchGantryViewMode()"> 秒</label>
</div>
        <div class="toggle-group" id="platedToggleGroup" style="display:none;">
            <label><input type="radio" name="platedViewMode" value="upToNow" checked onchange="switchPlatedViewMode()"> 截止当前时间</label>
            <label><input type="radio" name="platedViewMode" value="all" onchange="switchPlatedViewMode()"> 全部记录</label>
        </div>
        <p id="detailDesc" style="font-size: 0.85em; color: #aaa; margin-top: 0px; margin-bottom: 8px;"></p>
        <table class="traj-table" id="detailTable"></table>
    </div>
    </div>

</div>


<script>
    const VEHICLE_RADIUS = 9;
    const leftDetailPanel = document.getElementById('leftDetailPanel');
let currentLeftDetailVehicle = null;      // 左侧当前显示的车辆
let isLeftDetailOpen = false;
function closeLeftDetailPanel() {
    leftDetailPanel.style.display = 'none';
    currentLeftDetailVehicle = null;
    isLeftDetailOpen = false;
    adjustCanvasWidth();            // 调整画布宽度
    if (!isPlaying) draw();
}
function adjustCanvasWidth() {
    let leftW = leftDetailPanel.style.display === 'block' ? 440 : 0;
    let rightW = detailPanel.style.display === 'block' ? 440 : 0;
    canvas.width = canvas.parentElement.clientWidth - leftW - rightW - 10;
}
window.addEventListener('resize', () => {
    adjustCanvasWidth();
    if (!isPlaying) draw();
});
document.addEventListener('keydown', (e) => {
    // 若焦点在输入框、文本域或下拉选择框内，不触发，避免干扰正常输入
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

    if (e.code === 'Space') {
        e.preventDefault(); // 阻止按下空格键时页面滚动
        document.getElementById('btnPlay').click();
    }
    // ➡️ 1. 方向键快捷键 (左右方向键)
    else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        shiftTimeBy(-3000);   // 后退3秒
    } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        shiftTimeBy(3000);    // 前进3秒
    }
    // ➡️ 2. 大步长微调 (A / D 键)
    else if (e.code === 'KeyA') {
        e.preventDefault();
        shiftTimeBy(-6000);   // 后退6秒
    } else if (e.code === 'KeyD') {
        e.preventDefault();
        shiftTimeBy(6000);    // 前进6秒
    }
    // ➡️ 3. 极精准微调 (Q / E 键)
    else if (e.code === 'KeyQ') {
        e.preventDefault();
        shiftTimeBy(-300);   // 后退1秒
    } else if (e.code === 'KeyE') {
        e.preventDefault();
        shiftTimeBy(300);    // 前进1秒
    }
    // ➡️ 3. 极精准微调 (Q / E 键)
    else if (e.code === 'KeyJ') {
        e.preventDefault();
        shiftTimeBy(-100);   // 后退1秒
    } else if (e.code === 'KeyL') {
        e.preventDefault();
        shiftTimeBy(100);    // 前进1秒
    }
});
function shiftTimeBy(deltaMs) {
    if (frames.length === 0 && gantries.length === 0 && platedFrames.length === 0) return;

    // 1. 计算新时间，并加上最大最小值的越界保护
    let newTime = currentTime + deltaMs;
    if (newTime > maxTime) newTime = maxTime;
    if (newTime < minTime) newTime = minTime;
    if (newTime === currentTime) return;

    // 2. 更新全局时间
    currentTime = newTime;

    // 3. 同步更新进度条
    if (progressBar) progressBar.value = currentTime - minTime;

    // 4. 强制重新绘制地图上的所有车辆
    draw();

    // 5. 如果右侧明细面板是打开的，顺便连带刷新表格数据
    if (detailPanel && detailPanel.style.display === 'block') {
        if (currentDetailGantry) {
            let mode = document.querySelector('input[name="gantryViewMode"]:checked')?.value;
            if (mode === 'upToNow') renderGantryTable('upToNow');
        } else if (currentDetailPlatedVehicle) {
            let mode = document.querySelector('input[name="platedViewMode"]:checked')?.value;
            if (mode === 'upToNow') renderPlatedTable('upToNow');
        } else if (currentDetailVehicle) {
            let mode = document.querySelector('input[name="vehicleViewMode"]:checked')?.value;
            renderVehicleTable(mode || 'near');
        }
    }
}
    const canvas = document.getElementById('roadCanvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');

    let frames = [];
    let gantries = [];
    let uniqueGantries = new Map();
    let ghostIntervals = new Map();
    let preprocessedTraj = new Map();

    // 上牌后轨迹数据
    let platedFrames = [];
    let platedTrajMap = new Map();

    let isPlaying = false;
    let minTime = 0,
        maxTime = 0,
        currentTime = 0;
    let playSpeed = 5;
    let lastRenderTime = performance.now();
    let animationId = null;
    let currentRenderedFrame = null;
    let currentRenderedPlatedFrame = null;

    let currentDetailVehicle = null;
    let currentDetailGantry = null;
    let currentDetailPlatedVehicle = null;

    let camera = { x: 0, y: canvas.height / 2 - 60, scale: 0.55 };
    const rulerCanvas = document.getElementById('rulerCanvas');
const rulerCtx = rulerCanvas.getContext('2d');
// 拖拽框选相关变量
let isSelecting = false;
let selectionStartX = 0, selectionEndX = 0;
let selectRect = null; // 存储 { start, end }
let rulerWidth = 0;
let rulerMinM = 0, rulerMaxM = 0;

function updateRuler() {
    if (!rulerCanvas) return;
    rulerWidth = rulerCanvas.clientWidth;
    rulerCanvas.width = rulerWidth;
    rulerCanvas.height = 50;

    // 获取当前可视区域的里程范围（逻辑坐标）
    const visibleMinX = -camera.x / camera.scale;
    const visibleMaxX = (canvas.width - camera.x) / camera.scale;
    rulerMinM = visibleMinX;
    rulerMaxM = visibleMaxX;

    rulerCtx.clearRect(0, 0, rulerWidth, 50);
    rulerCtx.fillStyle = '#2a2a2a';
    rulerCtx.fillRect(0, 0, rulerWidth, 50);

    // 绘制刻度线和大刻度标签
    const step = getOptimalStepForRuler(); // 独立步长函数（稍后定义）
    const startM = Math.floor(rulerMinM / step) * step;
    for (let m = startM; m <= rulerMaxM; m += step) {
        const x = (m - rulerMinM) / (rulerMaxM - rulerMinM) * rulerWidth;
        if (x < 0 || x > rulerWidth) continue;
        rulerCtx.beginPath();
        rulerCtx.moveTo(x, 30);
        rulerCtx.lineTo(x, 45);
        rulerCtx.strokeStyle = '#aaa';
        rulerCtx.lineWidth = 1;
        rulerCtx.stroke();

        // 每隔一个步长显示文字（避免重叠）
        if (step >= 100 || (step >= 50 && Math.floor(m / step) % 2 === 0)) {
            rulerCtx.fillStyle = '#ddd';
            rulerCtx.font = '12px Arial';
            rulerCtx.textAlign = 'center';
            rulerCtx.fillText((m / 1000).toFixed(1) + 'km', x, 20);
        }
    }

    // 高亮 1110000~1130000 区域
    const hlStart = 1110000, hlEnd = 1130000;
    if (rulerMaxM > hlStart && rulerMinM < hlEnd) {
        const left = Math.max(0, (hlStart - rulerMinM) / (rulerMaxM - rulerMinM) * rulerWidth);
        const right = Math.min(rulerWidth, (hlEnd - rulerMinM) / (rulerMaxM - rulerMinM) * rulerWidth);
        rulerCtx.fillStyle = 'rgba(255, 100, 100, 0.4)';
        rulerCtx.fillRect(left, 0, right - left, 50);
        rulerCtx.strokeStyle = '#ff6666';
        rulerCtx.lineWidth = 1;
        rulerCtx.strokeRect(left, 0, right - left, 50);
    }
        // 绘制选择框（拖拽时）
    if (selectRect && isSelecting) {
        const left = (selectRect.start - rulerMinM) / (rulerMaxM - rulerMinM) * rulerWidth;
        const right = (selectRect.end - rulerMinM) / (rulerMaxM - rulerMinM) * rulerWidth;
        rulerCtx.fillStyle = 'rgba(100, 200, 255, 0.3)';
        rulerCtx.fillRect(left, 0, right - left, 50);
        rulerCtx.strokeStyle = '#66ccff';
        rulerCtx.lineWidth = 1.5;
        rulerCtx.strokeRect(left, 0, right - left, 50);
    }
}
function getOptimalStepForRuler() {
    const visibleRange = rulerMaxM - rulerMinM;
    if (visibleRange < 500) return 100;
    if (visibleRange < 1500) return 200;
    if (visibleRange < 4000) return 500;
    return 1000;
}
// 拖拽框选及点击跳转
rulerCanvas.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    isSelecting = true;
    const rect = rulerCanvas.getBoundingClientRect();
    const scaleX = rulerWidth / (rulerMaxM - rulerMinM);
    selectionStartX = rulerMinM + ((e.clientX - rect.left) / scaleX);
    selectionEndX = selectionStartX;
    selectRect = { start: selectionStartX, end: selectionStartX };
    rulerCanvas.style.cursor = 'crosshair';
    e.preventDefault();
});

// 修改原有的 mousemove 提示
rulerCanvas.addEventListener('mousemove', (e) => {
    if (isSelecting) return; // 拖拽时不显示悬浮提示
    const scaleX = rulerWidth / (rulerMaxM - rulerMinM);
    const mouseM = rulerMinM + (e.offsetX / scaleX);
    if (isNaN(mouseM)) return;
    let displayValue = mouseM >= 1000 ? (mouseM/1000).toFixed(2) + ' km' : Math.round(mouseM) + ' m';
    tooltip.innerText = `里程: ${displayValue}`;
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY + 15) + 'px';
    tooltip.style.display = 'block';
});
document.getElementById('btnFocusRange').addEventListener('click', () => {
    const start = 1110000;
    const end = 1130000;
    const width = end - start;
    camera.scale = canvas.width / width * 0.95;
    const center = (start + end) / 2;
    camera.x = canvas.width / 2 - center * camera.scale;
    if (!isPlaying) draw();
    updateRuler();
});
rulerCanvas.addEventListener('mouseup', (e) => {
    if (!isSelecting) return;
    isSelecting = false;
    rulerCanvas.style.cursor = 'pointer';

    const moved = Math.abs(selectionEndX - selectionStartX);
    if (moved < 5) {
        // 视为点击跳转
        const clickM = selectionStartX;
        if (!isNaN(clickM)) {
            camera.x = canvas.width / 2 - clickM * camera.scale;
            if (!isPlaying) draw();
            updateRuler();
        }
    } else {
        // 拖拽选择范围，放大到该范围
        const rangeStart = selectRect.start;
        const rangeEnd = selectRect.end;
        const rangeWidth = rangeEnd - rangeStart;
        if (rangeWidth > 0) {
            const targetScale = canvas.width / rangeWidth * 0.95;
            camera.scale = Math.min(8, Math.max(0.05, targetScale));
            const centerM = (rangeStart + rangeEnd) / 2;
            camera.x = canvas.width / 2 - centerM * camera.scale;
            if (!isPlaying) draw();
            updateRuler();
        }
    }
    selectRect = null;
    updateRuler(); // 清除选择框
});
    // 滚轮缩放横轴
rulerCanvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = rulerCanvas.getBoundingClientRect();
    const scaleX = rulerWidth / (rulerMaxM - rulerMinM);
    const mouseX = e.clientX - rect.left;
    const mouseM = rulerMinM + (mouseX / scaleX);
    if (isNaN(mouseM)) return;

    const delta = e.deltaY > 0 ? 1.1 : 0.9; // 缩放因子
    let newScale = camera.scale * delta;
    if (newScale < 0.05) newScale = 0.05;
    if (newScale > 8) newScale = 8;

    // 以鼠标位置对应的里程为中心缩放
    camera.scale = newScale;
    camera.x = canvas.width / 2 - mouseM * camera.scale;

    if (!isPlaying) draw();
    updateRuler();
});
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let clickStart = { x: 0, y: 0 };

    const progressBar = document.getElementById('progressBar');
    const timeDisplay = document.getElementById('timeDisplay');
    const detailPanel = document.getElementById('detailPanel');
    const LANE_WIDTH = 20;
    const ROAD2_CENTER_Y = 360;

    function parseGantryTime(timeStr) {
        const isoStr = timeStr.replace(' ', 'T').replace(/:(\d{3})$/, '.$1') + '+08:00';
        return Date.parse(isoStr);
    }


function parsePlated(lines) {
    platedFrames = [];
    platedTrajMap.clear();
    console.log('开始解析上牌数据，行数:', lines.length);

    lines.forEach((line, idx) => {
        const trimmed = line.trim();
        if (!trimmed) return;
        try {
            const data = JSON.parse(trimmed);
            // 兼容数组格式

   function parseRaster(lines) {
    frames = [];
    lines.forEach((line, idx) => {
        const trimmed = line.trim();
        if (!trimmed) return;
        try {
            const safeLine = trimmed.replace(/"ID":(\d+)/g, '"ID":"$1"');
            const data = JSON.parse(safeLine);
            if (data.TIME && data.TDATA && Array.isArray(data.TDATA)) {
                frames.push({ time: data.TIME, vehicles: data.TDATA });
            } else {
                console.warn(`第${idx+1}行缺少必要字段 TIME/TDATA`, data);
            }
        } catch (err) {
            console.error(`解析光栅第${idx+1}行失败:`, trimmed.substring(0, 200), err);
        }
    });
    frames.sort((a, b) => a.time - b.time);
    console.log(`光栅解析完成：有效帧数 ${frames.length}，时间范围 ${new Date(frames[0]?.time)} - ${new Date(frames[frames.length-1]?.time)}`);
}
    function parseGantry(lines) {
        gantries = [];
        uniqueGantries.clear();
        lines.forEach(line => {
            if (!line.trim()) return;
            try {
                const data = JSON.parse(line);
                const t = parseGantryTime(data.uploadTime);
                gantries.push({ ...data, time: t, activeUntil: 0 });
                const mileage = data.mileage;
                const direction = data.direction;
                const deviceId = data.deviceId;
                if (mileage === undefined || direction === undefined) return;
                const key = `${mileage}_${direction}`;
                if (!uniqueGantries.has(key)) {
                    uniqueGantries.set(key, { mileage: mileage, direction: direction,
                        deviceIds: [deviceId] });
                } else {
                    let existing = uniqueGantries.get(key);
                    if (!existing.deviceIds.includes(deviceId)) {
                        existing.deviceIds.push(deviceId);
                    }
                }
            } catch (err) {}
        });
        gantries.sort((a, b) => a.time - b.time);
        console.log(`断面聚合完成: 原始设备记录数 ${gantries.length}, 聚合后断面数 ${uniqueGantries.size}`);
    }

    function parseTraj(lines) {
        preprocessedTraj.clear();
        lines.forEach(line => {
            if (!line.trim()) return;
            try {
                let parts = line.split('|');
                if (parts.length < 2) return;
                let id = parts[0].split('_')[0];
                let pointsRaw = parts[1].split(';');
                let points = [];
                for (let p of pointsRaw) {
                    if (!p) continue;
                    let inner = p.replace(/^\(|\)$/g, '');
                    let attrs = inner.split(',');
                    if (attrs.length >= 4) {
                        let timeStr = attrs[3];
                        points.push({
                            mileage: parseFloat(attrs[0]),
                            wayno: parseInt(attrs[1]),
                            speed: parseFloat(attrs[2]),
                            timeStr: timeStr,
                            timeMs: parseGantryTime(timeStr)
                        });
                    }
                }
                points.sort((a, b) => a.timeMs - b.timeMs);
                preprocessedTraj.set(id, points);
            } catch (err) {}
        });
    }

    function analyzeGhostIntervals() {
        ghostIntervals.clear();
        let trackMap = new Map();
        frames.forEach(frame => {
            frame.vehicles.forEach(v => {
                if (!trackMap.has(v.ID)) trackMap.set(v.ID, []);
                trackMap.get(v.ID).push({ time: frame.time, mileage: v.tpointno, direct: v
                        .direct });
            });
        });
        trackMap.forEach((points, id) => {
            let segments = [];
            let currentSegment = [points[0]];
            for (let i = 1; i < points.length; i++) {
                if (points[i].time - points[i - 1].time > 5000) {
                    segments.push(currentSegment);
                    currentSegment = [points[i]];
                } else {
                    currentSegment.push(points[i]);
                }
            }
            segments.push(currentSegment);
            let intervals = [];
            segments.forEach(seg => {
                let firstPt = seg[0];
                let matchedGantry = null;
                uniqueGantries.forEach(g => {
                    if (g.direction === firstPt.direct && Math.abs(firstPt.mileage - g
                            .mileage) <= 100) {
                        matchedGantry = g;
                    }
                });
                if (matchedGantry) {
                    let ghostStart = firstPt.time;
                    let ghostEnd = seg[seg.length - 1].time;
                    for (let i = 0; i < seg.length; i++) {
                        let pt = seg[i];
                        if (matchedGantry.direction === 1 && pt.mileage > matchedGantry.mileage) {
                            ghostEnd = pt.time;
                            break;
                        } else if (matchedGantry.direction === 2 && pt.mileage < matchedGantry
                            .mileage) {
                            ghostEnd = pt.time;
                            break;
                        }
                    }
                    intervals.push({ start: ghostStart, end: ghostEnd });
                }
            });
            if (intervals.length > 0) ghostIntervals.set(id, intervals);
        });
    }

    function isGhostCurrently(id, currTime) {
        if (!ghostIntervals.has(id)) return false;
        let intervals = ghostIntervals.get(id);
        for (let i = 0; i < intervals.length; i++) {
            if (currTime >= intervals[i].start && currTime <= intervals[i].end) return true;
        }
        return false;
    }





function draw() {

drawGantriesLower();  // 新增：下方道路显示断面标记
        // ==========================================
        // ⭐ 修复核心：分别寻找两个方向的最新光栅帧并合并
        // ==========================================
        let latestDir1Frame = null;
        let latestDir2Frame = null;

        for (let i = frames.length - 1; i >= 0; i--) {
            const frame = frames[i];
            if (frame.time <= currentTime) {
                if (frame.vehicles.length > 0) {
                    const dir = frame.vehicles[0].direct;
                    // 分别记录方向 1 和方向 2 的最新帧
                    if (dir === 1 && !latestDir1Frame) latestDir1Frame = frame;
                    else if (dir === 2 && !latestDir2Frame) latestDir2Frame = frame;
                }

                // 如果两个方向都找到了，或者往前找超过了 500ms（防止死循环/断流太久），就停止搜索
                if ((latestDir1Frame && latestDir2Frame) || (currentTime - frame.time > 500)) {
                    break;
                }
            }
        }

        // 将找到的两个方向的车辆合并为一个渲染帧
        currentRenderedFrame = { time: currentTime, vehicles: [] };
        if (latestDir1Frame) currentRenderedFrame.vehicles.push(...latestDir1Frame.vehicles);
        if (latestDir2Frame) currentRenderedFrame.vehicles.push(...latestDir2Frame.vehicles);

        // 渲染合并后的光栅车辆
        if (currentRenderedFrame.vehicles.length > 0) {
            drawVehicles(currentRenderedFrame.vehicles);
        }

        // ==========================================
        // 融合数据因为是双向打包的，保留原逻辑即可
        // ==========================================
        currentRenderedPlatedFrame = null;
        for (let i = platedFrames.length - 1; i >= 0; i--) {
            if (platedFrames[i].time <= currentTime) {
                currentRenderedPlatedFrame = platedFrames[i];
                break;
            }
        }
        if (currentRenderedPlatedFrame) {
            drawPlatedVehicles(currentRenderedPlatedFrame.vehicles);
        }

        ctx.restore();
        updateRuler();
        updateUI();
    }

        ctx.fillStyle = 'rgba(255, 100, 100, 0.3)';
        ctx.fillRect(left, yTop, right - left, yBottom - yTop);
        // 添加边框标注
        ctx.strokeStyle = '#ff6666';
        ctx.lineWidth = 1.5 / camera.scale;
        ctx.setLineDash([5, 5]);
        ctx.strokeRect(left, yTop, right - left, yBottom - yTop);
        ctx.setLineDash([]);
    }

    ctx.strokeStyle = '#fff';
    ctx.fillStyle = '#aaa';
    ctx.font = `${12 / camera.scale}px Arial`;
    ctx.textAlign = 'center';

    const step = getOptimalStep();
    const startX = Math.floor(minX / step) * step;
    for (let x = startX; x <= maxX; x += step) {
        ctx.beginPath();
        ctx.moveTo(x, yBase);
        ctx.lineTo(x, yBase + 10);
        ctx.stroke();
        ctx.fillText(x + ' m', x, yBase + 22);
    }
}

// 新增辅助函数：根据可视范围自动选择刻度步长
function getOptimalStep() {
    const visibleRange = canvas.width / camera.scale; // 当前可见宽度（米）
    if (visibleRange < 30) return 1;
    if (visibleRange < 60) return 5;
    if (visibleRange < 150) return 10;
    if (visibleRange < 400) return 50;
    if (visibleRange < 1000) return 100;
    if (visibleRange < 2500) return 200;
    return 500;
}

    function drawGantries() {
        const flashDuration = 300;
        uniqueGantries.forEach(g => {
            const isDir1 = g.direction === 1;
            const yOffset = isDir1 ? -100 : 0;
            const yHeight = 100;
 const isTracked = currentDetailGantry &&
                          currentDetailGantry.mileage === g.mileage &&
                          currentDetailGantry.direction === g.direction;
            ctx.fillStyle = isTracked ? '#81d4fa' : '#4fc3f7';
            ctx.fillRect(g.mileage, yOffset, (isTracked ? 4 : 2) / camera.scale, yHeight);
            let deviceHint = g.deviceIds.length > 1 ? ` (${g.deviceIds.length}个设备)` : '';
            ctx.fillStyle = isTracked ? '#fff' : '#ccc';
            ctx.font = `${(isTracked ? 16 : 14)/camera.scale}px Arial`;
            ctx.textAlign = 'left';
            ctx.fillText(`断面${g.mileage}m${deviceHint}`, g.mileage - 10, isDir1 ? yOffset - 10 / camera.scale :
                yOffset + yHeight + 20 / camera.scale);
            let zoneStart = isDir1 ? g.mileage - 30 : g.mileage + 15;
            let zoneWidth = 15;
            const isFlashing = gantries.some(event =>
                event.mileage === g.mileage &&
                event.direction === g.direction &&
                event.time <= currentTime &&
                currentTime <= event.time + flashDuration
            );
            ctx.fillStyle = isFlashing ? 'rgba(244, 67, 54, 0.7)' : 'rgba(255, 213, 79, 0.3)';
            ctx.fillRect(zoneStart, yOffset, zoneWidth, yHeight);
            if (isFlashing) {
                let activeEvent = gantries.find(event =>
                    event.mileage === g.mileage &&
                    event.direction === g.direction &&
                    event.time <= currentTime &&
                    currentTime <= event.time + flashDuration
                );
                if (activeEvent) {
                    ctx.fillStyle = '#fff';
                    ctx.font = `bold ${16/camera.scale}px Arial`;
                    ctx.fillText("📸 " + activeEvent.plateNumber, zoneStart, yOffset + yHeight / 2);
                }
            }
        });
    }

    function drawVehicles(vehicles) {
        vehicles.forEach(v => {
            const isDir1 = v.direct === 1;
            let safeWayno = (v.wayno === 9 || v.wayno > 5) ? 5 : (v.wayno || 1);
            const y = isDir1 ? -(safeWayno - 0.5) * LANE_WIDTH : (safeWayno - 0.5) * LANE_WIDTH;
            const x = v.tpointno;
            const isGhost = isGhostCurrently(v.ID, currentTime);
            ctx.beginPath();
            ctx.arc(x, y,VEHICLE_RADIUS / camera.scale, 0, Math.PI * 2);
const isTracked = (currentDetailVehicle && currentDetailVehicle.ID === v.ID) ||
                  (currentLeftDetailVehicle && currentLeftDetailVehicle.ID === v.ID);
            if (isGhost) {
                ctx.shadowColor = '#e040fb';
                ctx.shadowBlur = 20 / camera.scale;
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.lineWidth = isTracked ? 5 / camera.scale : 3 / camera.scale;
                ctx.strokeStyle = isTracked ? '#fff' : '#e040fb';
                ctx.stroke();
                ctx.shadowBlur = 0;
            } else {
                ctx.fillStyle = isDir1 ? '#81c784' : '#e57373';
                ctx.fill();
                if (isTracked) { ctx.lineWidth = 3 / camera.scale;
                    ctx.strokeStyle = '#fff';
                    ctx.stroke(); }
            }
            const displayId = String(v.ID).slice(-6);
            ctx.fillStyle = isGhost ? '#e040fb' : (isTracked ? '#4fc3f7' : '#fff');
            ctx.font = `${isTracked ? 16 : 14}/camera.scale}px Arial`;
            ctx.textAlign = 'left';
ctx.fillText(`ID:${displayId} (${Math.round(v.speed)})`, x + 14 / camera.scale, y + 6 / camera.scale);
        });
    }

    function drawPlatedVehicles(vehicles) {
        vehicles.forEach(v => {
            const isDir1 = v.direction === 1;
            let safeWayno = (v.laneNo === 9 || v.laneNo > 5) ? 5 : (v.laneNo || 1);

                LANE_WIDTH);

                .id);

ctx.fillText(`${displayLabel} ID:${displayId} (${Math.round(v.speed)})`, x + 14 / camera.scale, y + 6 / camera.scale);

function updateKmSelector() {
    let minM = Infinity, maxM = -Infinity;
    frames.forEach(f => f.vehicles.forEach(v => {
        if (v.tpointno < minM) minM = v.tpointno;
        if (v.tpointno > maxM) maxM = v.tpointno;
    }));
    if (platedFrames.length) {
        platedFrames.forEach(f => f.vehicles.forEach(v => {
            if (v.mileage < minM) minM = v.mileage;
            if (v.mileage > maxM) maxM = v.mileage;
        }));
    }
    if (minM === Infinity) return;
    const startKm = Math.floor(minM / 1000);
    const endKm = Math.ceil(maxM / 1000);
    const select = document.getElementById('kmSelector');
    select.innerHTML = '<option value="">-- 选择公里数 --</option>';
    for (let km = startKm; km <= endKm; km++) {
        const val = km * 1000;
        const option = document.createElement('option');
        option.value = val;
        option.text = `${km} km (${val}m)`;
        select.appendChild(option);
    }
    document.getElementById('kmRangeInfo').innerText = `里程范围 ${Math.floor(minM)}m ~ ${Math.ceil(maxM)}m`;
}

            let v = currentRenderedPlatedFrame.vehicles[i];
            let safeWayno = (v.laneNo === 9 || v.laneNo > 5) ? 5 : (v.laneNo || 1);
            let vY = ROAD2_CENTER_Y + (v.direction === 1 ? -(safeWayno - 0.5) * LANE_WIDTH : (safeWayno - 0.5) *
                LANE_WIDTH);
            let circleHit = Math.sqrt(Math.pow(logicX - v.mileage, 2) + Math.pow(logicY - vY, 2)) <= 15 / camera
            .scale;
            let textHit = logicX >= v.mileage && logicX <= v.mileage + 140 / camera.scale &&
                logicY >= vY - 10 / camera.scale && logicY <= vY + 10 / camera.scale;
            if (circleHit || textHit) return v;
        }
        return null;
    }

    canvas.addEventListener('mousedown', e => {
        isDragging = true;
        dragStart.x = e.offsetX - camera.x;
        dragStart.y = e.offsetY - camera.y;
        clickStart.x = e.offsetX;
        clickStart.y = e.offsetY;
        canvas.style.cursor = 'grabbing';
        updateRuler();
    });

    canvas.addEventListener('mousemove', e => {
        if (isDragging) {
            camera.x = e.offsetX - dragStart.x;
            camera.y = e.offsetY - dragStart.y;
            if (!isPlaying) draw();
            tooltip.style.display = 'none';
        } else {
            const logicX = (e.offsetX - camera.x) / camera.scale;
            const logicY = (e.offsetY - camera.y) / camera.scale;
            let hoveredV = getHitVehicle(logicX, logicY);
            let hoveredG = getHitGantry(logicX, logicY);
            let hoveredPV = getHitPlatedVehicle(logicX, logicY);
            if (hoveredPV) {
                canvas.style.cursor = 'pointer';
                tooltip.style.display = 'none';
            } else if (hoveredV) {
                canvas.style.cursor = 'pointer';
                tooltip.style.display = 'none';
            } else if (hoveredG) {
                canvas.style.cursor = 'pointer';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
                const deviceCnt = hoveredG.deviceIds.length;
                tooltip.innerText =
                    `📡 物理断面 ${hoveredG.mileage}m (方向${hoveredG.direction})\n聚合设备数: ${deviceCnt}\n点击查看该断面全部上报记录`;
                tooltip.style.display = 'block';
            } else {
                canvas.style.cursor = 'grab';
                tooltip.style.display = 'none';
            }
            // 检查是否悬浮在里程轴上（上方道路的轴线）
const yBaseTop = (0 + 130);  // 上路轴线 y 坐标（逻辑坐标）
const threshold = 15 / camera.scale; // 容许的点击范围（像素转逻辑单位）
if (Math.abs(logicY - yBaseTop) < threshold) {
    // 显示上路里程提示
    const mileage = Math.round(logicX);
    tooltip.innerText = `里程: ${mileage} m`;
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY + 15) + 'px';
    tooltip.style.display = 'block';
    canvas.style.cursor = 'pointer';
    return; // 优先显示里程提示，不覆盖其他
}
// 检查下方道路的轴线
const yBaseBottom = (ROAD2_CENTER_Y + 130);
if (Math.abs(logicY - yBaseBottom) < threshold) {
    const mileage = Math.round(logicX);
    tooltip.innerText = `里程: ${mileage} m`;
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY + 15) + 'px';
    tooltip.style.display = 'block';
    canvas.style.cursor = 'pointer';
    return;
}
        }
    });

    canvas.addEventListener('mouseup', e => {
        isDragging = false;
        const logicX = (e.offsetX - camera.x) / camera.scale;
        const logicY = (e.offsetY - camera.y) / camera.scale;
        let hoveredPV = getHitPlatedVehicle(logicX, logicY);
        let hoveredV = getHitVehicle(logicX, logicY);
        let hoveredG = getHitGantry(logicX, logicY);
        canvas.style.cursor = (hoveredV || hoveredG || hoveredPV) ? 'pointer' : 'grab';
        if (Math.abs(e.offsetX - clickStart.x) < 5 && Math.abs(e.offsetY - clickStart.y) < 5) {
            if (hoveredPV) {
                showPlatedVehicleDetails(hoveredPV);
            } else if (hoveredV) {
                hoveredV.time = currentRenderedFrame ? currentRenderedFrame.time : currentTime;
                showTrajectoryDetails(hoveredV);
            } else if (hoveredG) {
                showGantryDetails(hoveredG);
            }
        }
    });

    canvas.addEventListener('mouseleave', () => {
        isDragging = false;
        canvas.style.cursor = 'grab';
        tooltip.style.display = 'none';
    });

    function updateUI() {
        const d = new Date(currentTime);
        const ms = d.getMilliseconds().toString().padStart(3, '0');
        const s = d.getSeconds().toString().padStart(2, '0');
        const m = d.getMinutes().toString().padStart(2, '0');
        const h = d.getHours().toString().padStart(2, '0');
        timeDisplay.innerText = `${h}:${m}:${s}.${ms}`;
        if (!isDraggingProgress) progressBar.value = currentTime - minTime;
        if (isPlaying && detailPanel.style.display === 'block') {
            if (currentDetailGantry) {
                let mode = document.querySelector('input[name="gantryViewMode"]:checked')?.value;
                if (mode === 'upToNow') renderGantryTable('upToNow');
            }
            if (currentDetailPlatedVehicle) {
                let mode = document.querySelector('input[name="platedViewMode"]:checked')?.value;
                if (mode === 'upToNow') renderPlatedTable('upToNow');
            }
        }
        if (isLeftDetailOpen && currentLeftDetailVehicle) {
    let mode = document.querySelector('input[name="leftVehicleViewMode"]:checked')?.value;
    renderLeftVehicleTable(mode);
}
        if (currentTime >= maxTime && isPlaying) {
            isPlaying = false;
            document.getElementById('btnPlay').innerText = '播放';
        }
    }

    function loop(now) {
        if (isPlaying) { currentTime += (now - lastRenderTime) * playSpeed;
            draw(); }
        lastRenderTime = now;
        animationId = requestAnimationFrame(loop);
    }

    document.getElementById('btnPlay').onclick = (e) => {
        isPlaying = !isPlaying;
        e.target.innerText = isPlaying ? '暂停' : '播放';
        if (isPlaying && currentTime >= maxTime) currentTime = minTime;
        if (!animationId) requestAnimationFrame(loop);
    };
    document.getElementById('btnReset').onclick = () => {
        currentTime = minTime;
        isPlaying = false;
        document.getElementById('btnPlay').innerText = '播放';
        draw();
    };
    document.getElementById('speedRange').oninput = (e) => playSpeed = parseFloat(e.target.value);
    let isDraggingProgress = false;
    progressBar.addEventListener('mousedown', () => isDraggingProgress = true);
    progressBar.addEventListener('mouseup', () => isDraggingProgress = false);
    progressBar.addEventListener('input', (e) => {
        currentTime = minTime + parseFloat(e.target.value);
        if (!isPlaying) draw();
        if (currentDetailGantry) {
            let mode = document.querySelector('input[name="gantryViewMode"]:checked')?.value;
            if (mode === 'upToNow') renderGantryTable('upToNow');
        } else if (currentDetailVehicle) {
            renderVehicleTable(document.querySelector('input[name="vehicleViewMode"]:checked').value);
        } else if (currentDetailPlatedVehicle) {
            let mode = document.querySelector('input[name="platedViewMode"]:checked')?.value;
            if (mode === 'upToNow') renderPlatedTable('upToNow');
        }
        if (isLeftDetailOpen && currentLeftDetailVehicle) {
    let mode = document.querySelector('input[name="leftVehicleViewMode"]:checked')?.value;
    renderLeftVehicleTable(mode);
}
    });

    canvas.addEventListener('wheel', e => {
        e.preventDefault();
        const zoomIntensity = 0.1;
        const wheel = e.deltaY < 0 ? 1 : -1;
        let zoom = Math.exp(wheel * zoomIntensity);
        camera.x = e.offsetX - (e.offsetX - camera.x) * zoom;
        camera.y = e.offsetY - (e.offsetY - camera.y) * zoom;
        camera.scale *= zoom;
        const logicX = (e.offsetX - camera.x) / camera.scale;
        const logicY = (e.offsetY - camera.y) / camera.scale;
        canvas.style.cursor = (getHitVehicle(logicX, logicY) || getHitGantry(logicX, logicY) || getHitPlatedVehicle(
            logicX, logicY)) ? 'pointer' : (isDragging ? 'grabbing' : 'grab');
        if (!isPlaying) draw();
        updateRuler();
    });
    // 🔄 挂载页面生命周期，开屏免人工一键拉取
    window.onload = () => {
        autoLoadAllData();
    };
</script>
</body>
</html>
